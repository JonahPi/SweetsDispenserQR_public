<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sweets Dispenser</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>🍬 Sweets Dispenser</h1>
    </header>

    <main>

        <!-- Home Screen -->
        <div id="view-home" class="view" hidden>
            <div class="credits-row">
                <span id="credits-display">Credits: 4</span>
            </div>
            <div class="toggle-row">
                <span class="toggle-label">Kids</span>
                <label class="switch">
                    <input type="checkbox" id="mode-toggle" checked>
                    <span class="slider"></span>
                </label>
                <span class="toggle-label">Standard</span>
            </div>
            <div class="challenge-buttons">
                <button class="challenge-btn" id="btn-mathe">Mathe</button>
                <button class="challenge-btn" id="btn-physik">Physik</button>
                <button class="challenge-btn" id="btn-erdkunde">Erdkunde</button>
                <button class="challenge-btn" id="btn-geschichte">Geschichte</button>
            </div>
            <p id="no-credits-msg" class="no-credits-msg" hidden>
                Schlüssel abgelaufen.<br>Bitte QR-Code neu scannen.
            </p>
        </div>

        <!-- Mathe Challenge -->
        <div id="view-mathe" class="view" hidden>
            <h2>Mathe</h2>
            <div id="equations"></div>
            <div id="points-display" hidden></div>
            <p id="mqtt-status" class="mqtt-status" hidden></p>
            <button id="btn-senden">Senden</button>
        </div>

        <!-- Multiple-Choice Challenge -->
        <div id="view-mc" class="view" hidden>
            <h2 id="mc-title">Physik</h2>
            <div id="mc-questions"></div>
            <div id="mc-points-display" hidden></div>
            <p id="mc-mqtt-status" class="mqtt-status" hidden></p>
            <button id="btn-mc-senden">Senden</button>
        </div>

        <!-- Error -->
        <div id="view-error" class="view card error" hidden>
            <div class="icon">❌</div>
            <p id="msg-error"></p>
        </div>

    </main>

    <script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
    <script src="questions_physik.js"></script>
    <script src="questions_erdkunde.js"></script>
    <script src="questions_geschichte.js"></script>
    <script src="app.js"></script>
</body>
</html>
